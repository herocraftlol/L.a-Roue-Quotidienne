# Configuration LoyaltyMobs

# Nombre de tickets donnes chaque jour de connexion (en plus des paliers ci-dessous)
tickets-par-jour: 1

# Tickets bonus offerts quand la serie de connexions atteint ces paliers (une seule fois par palier atteint dans la serie en cours)
paliers-serie:
  3: 2
  7: 5
  14: 10
  30: 25

# Zone de l'arene PvP. Se configure en jeu avec /arenepvp pos1 et /arenepvp pos2
# (utilise le bloc regarde par l'administrateur). Ne pas editer coin1/coin2 a la main
# sauf si tu sais ce que tu fais : le plugin les reecrit automatiquement.
arene:
  monde: ""
  # coin1 et coin2 sont ajoutes automatiquement par /arenepvp pos1 et /arenepvp pos2

  # Duree de vie d'un bloc pose par un joueur avant qu'il ne disparaisse (secondes)
  duree-vie-bloc-secondes: 10

  # Intervalle entre chaque recharge d'un bloc de construction (secondes)
  regen-bloc-secondes: 1

  # Temps de recharge avant qu'une unité de mob invoquée puisse resservir (secondes).
  # Le mob n'est plus jamais perdu : posséder plusieurs fois le même permet d'en
  # invoquer plusieurs en simultané (chaque unité a son propre temps de recharge).
  invocation-cooldown-secondes: 3600

  # Points de fidélité PvP gagnés à chaque kill en arène
  points-par-kill: 15

  # Coût en points d'un ticket de roue acheté via /points acheter
  cout-ticket-points: 1500

  # Temps de recharge minimum entre deux tirs de l'arc du kit (secondes)
  arc-cooldown-secondes: 3

# Duree de vie maximale d'un mob allie invoque en secondes (0 = illimite tant qu'il ne meurt pas)
duree-vie-allie-secondes: 600

# =========================================================
#  Boutique en argent reel (achat de tickets de roue sur le site web)
#  ENTIEREMENT OPTIONNEL : tout le reste du plugin fonctionne sans MySQL.
#  Voir website-node/README.md pour l'installation complete du site.
# =========================================================
boutique:
  enabled: false

  # URL publique de la boutique en ligne, utilisee par /acheterticket pour envoyer un lien
  # cliquable au joueur (doit etre l'URL PUBLIQUE via ton reverse-proxy, pas une IP interne)
  url: "https://tonsite.fr/boutique-tickets"

  # Intervalle (en secondes) auquel le plugin verifie les nouveaux achats de tickets
  # faits depuis le site web (table pending_ticket_grants)
  sync-interval-seconds: 15

mysql:
  # Base MySQL partagee avec le micro-service du site web (website-node/).
  # N'est utilisee QUE si boutique.enabled est a true ci-dessus.
  host: "127.0.0.1"
  port: 3306
  database: "loyaltymobs_shop"
  user: "loyaltymobs_user"
  password: "CHANGE_ME"
  pool-size: 4
  useSSL: false
