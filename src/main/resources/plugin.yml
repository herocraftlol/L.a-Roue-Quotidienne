name: LoyaltyMobs
version: '1.0.13'
main: fr.fidelmobs.LoyaltyMobsPlugin
api-version: '1.21'
author: Toi
description: Fidelisation par connexions journalieres, roue de mobs/blocs/equipements a collectionner, et arene PvP.

commands:
  streak:
    description: Affiche ta serie de connexions et tes tickets.
    usage: /streak
  roue:
    description: Tourne la roue pour obtenir un mob, un bloc ou un equipement aleatoire (consomme un ticket).
    usage: /roue
  armee:
    description: Affiche ta collection de mobs.
    usage: /armee
  invoquer:
    description: Invoque un mob de ta collection pour combattre a tes cotes en arene.
    usage: /invoquer <mob>
  bloc:
    description: Choisis ton bloc de construction actif pour l'arene PvP.
    usage: /bloc <liste|choisir> [type]
  equipement:
    description: Consulte et equipe ton materiel PvP (armure/epee/fleches a effet).
    usage: /equipement <liste|equiper|fleches> [numero]
  arenepvp:
    description: "[Admin] Definit la zone de l'arene PvP via le bloc regarde."
    usage: /arenepvp <pos1|pos2|info>
    permission: loyaltymobs.admin
  classement:
    description: "[Admin] Invoque un hologramme de classement PvP (top kills, top morts, meilleurs K/D) a ta position."
    usage: /classement [retirer]
    permission: loyaltymobs.admin
  points:
    description: Affiche tes points de fidelite PvP et permet d'en echanger contre des tickets de roue.
    usage: /points [acheter]
  acheterticket:
    description: Donne un lien vers la boutique en ligne pour acheter des tickets de roue avec de l'argent reel.
    usage: /acheterticket

permissions:
  loyaltymobs.use:
    description: Autorise l'utilisation des commandes du plugin.
    default: true
  loyaltymobs.admin:
    description: Commandes d'administration (configuration de l'arene).
    default: op
